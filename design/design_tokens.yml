colors:
  background: "#0b0d12"
  surface: "#12161d"
  surface_alt: "#171c24"
  border: "#252c38"
  card: "#10141b"
  primary: "#f7f8fb"
  secondary: "#cfd6e3"
  accent: "#8b5cf6"
  success: "#34d399"
  warning: "#fbbf24"
  danger: "#fb7185"
  text_primary: "#f7f8fb"
  text_secondary: "#cfd6e3"
  text_muted: "#92a0b3"

typography:
  font_sans: "Space Grotesk"
  font_display: "Archivo"
  sizes:
    xs: "0.75rem"
    sm: "0.875rem"
    base: "1rem"
    lg: "1.125rem"
    xl: "1.25rem"
    "2xl": "1.5rem"
    "3xl": "1.875rem"
    "4xl": "2.25rem"
    "5xl": "3rem"
    "6xl": "3.75rem"
  line_heights:
    tight: "1.05"
    snug: "1.2"
    normal: "1.5"
    relaxed: "1.7"
  letter_spacing:
    tight: "-0.03em"
    normal: "-0.01em"
  weights:
    regular: 400
    medium: 500
    semibold: 600
    bold: 700

spacing:
  0: "0"
  1: "0.25rem"
  2: "0.5rem"
  3: "0.75rem"
  4: "1rem"
  5: "1.25rem"
  6: "1.5rem"
  8: "2rem"
  10: "2.5rem"
  12: "3rem"
  16: "4rem"
  20: "5rem"
  24: "6rem"
  32: "8rem"

shadows:
  soft: "0 10px 30px rgba(0,0,0,0.18)"
  medium: "0 18px 50px rgba(0,0,0,0.24)"
  large: "0 30px 90px rgba(0,0,0,0.32)"
  glow: "0 0 80px rgba(139,92,246,0.14)"

radius:
  sm: "0.375rem"
  md: "0.625rem"
  lg: "0.875rem"
  xl: "1.25rem"
  "2xl": "1.75rem"
  full: "9999px"

breakpoints:
  mobile: "375px"
  tablet: "768px"
  laptop: "1024px"
  desktop: "1440px"
  ultrawide: "1728px"

animation:
  duration_fast: "160ms"
  duration_normal: "320ms"
  duration_slow: "720ms"
  easing_primary: "cubic-bezier(0.22, 1, 0.36, 1)"
  easing_secondary: "cubic-bezier(0.16, 1, 0.3, 1)"
